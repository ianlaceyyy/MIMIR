services:
  db:
    image: postgis/postgis:16-3.4
    container_name: mimir-db
    environment:
      POSTGRES_USER: mimir
      POSTGRES_PASSWORD: mimir
      POSTGRES_DB: mimir
    ports:
      - "5432:5432"
    volumes:
      - mimir_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimir -d mimir"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mimir_pgdata:
